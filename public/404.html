<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>ManfredHu's Blog</title>
    <!--
      Single Page Apps for GitHub Pages
      https://github.com/rafgraph/spa-github-pages
      MIT License

      GitHub Pages serves this 404.html for any unknown deep link. The script
      below rewrites the URL into a query-string form and redirects to the app
      root (index.html), which restores the real path via history.replaceState.
    -->
    <script type="text/javascript">
      // This is a user/org page served from the domain root, so no path
      // segments need to be preserved.
      var pathSegmentsToKeep = 0

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
