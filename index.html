<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManfredHu's Blog</title>

    <!-- SEO: Base -->
    <meta
      name="description"
      content="ManfredHu 的个人博客，分享前端技术、计算机科学、效率工具与生活随笔。"
    />
    <meta name="author" content="ManfredHu" />
    <meta
      name="keywords"
      content="前端,JavaScript,TypeScript,React,Vue,浏览器,性能优化,效率工具"
    />
    <link rel="canonical" href="https://manfredhu.github.io/" />
    <meta name="robots" content="index, follow" />

    <!-- SEO: Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ManfredHu's Blog" />
    <meta property="og:title" content="ManfredHu's Blog" />
    <meta
      property="og:description"
      content="ManfredHu 的个人博客，分享前端技术、计算机科学、效率工具与生活随笔。"
    />
    <meta property="og:url" content="https://manfredhu.github.io/" />
    <meta
      property="og:image"
      content="https://manfredhu.github.io/images/myself/manfredhu128.png"
    />
    <meta property="og:locale" content="zh_CN" />

    <!-- SEO: Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ManfredHu's Blog" />
    <meta
      name="twitter:description"
      content="ManfredHu 的个人博客，分享前端技术、计算机科学、效率工具与生活随笔。"
    />
    <meta
      name="twitter:image"
      content="https://manfredhu.github.io/images/myself/manfredhu128.png"
    />

    <!-- Theme color -->
    <meta name="theme-color" content="#1e1e2e" />

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ManfredHu's Blog",
        "url": "https://manfredhu.github.io/",
        "description": "ManfredHu 的个人博客，分享前端技术、计算机科学、效率工具与生活随笔。",
        "author": {
          "@type": "Person",
          "name": "ManfredHu",
          "url": "https://github.com/ManfredHu"
        }
      }
    </script>

    <link rel="icon" type="image/png" href="/images/myself/manfredhu128.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
